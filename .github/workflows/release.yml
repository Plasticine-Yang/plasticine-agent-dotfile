name: release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.pull_request.merge_commit_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure all changesets are consumed
        run: |
          find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit | grep -q . && {
            echo 'Found unconsumed changesets.'
            exit 1
          } || true

      - name: Publish latest release
        id: release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_DIST_TAG: latest
          RELEASE_TRIGGER_LABEL: ${{ github.event_name == 'workflow_dispatch' && 'manual-dispatch' || format('#{0}', github.event.pull_request.number) }}
        run: pnpm release:publish

      - name: Send release email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.release.outputs.email_subject }}
          to: ${{ secrets.SMTP_FROM }}
          from: ${{ secrets.SMTP_FROM }}
          html_body: ${{ steps.release.outputs.email_html }}
